<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weighted Shuffle Music Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
    <script type="module" src="./index.js" defer></script>
</head>
<body>
    <header>
        <h1>Weighted Shuffle</h1>
        <button id="selectFolder">📂 Select Folder</button>
    </header>
    <music-playlist></music-playlist>
    <music-library></music-library>
    <div id="player-bar">
        <input type="range" id="seekBar" min="0" max="1000" value="0" step="1">
        <div id="now-playing">
            <span id="nowPlaying">No song selected</span>
            <span id="nowPlayingScore"></span>
        </div>
        <div id="transport-controls">
            <button id="previous" class="transport-btn" title="Previous"></button>
            <button id="playPause" class="transport-btn play-btn" title="Play"></button>
            <button id="next" class="transport-btn" title="Next"></button>
        </div>
        <div id="vote-controls">
            <button id="downvote" class="vote-btn downvote-btn" title="Downvote">👎</button>
            <button id="upvote" class="vote-btn upvote-btn" title="Upvote">👍</button>
        </div>
        <audio id="audioPlayer"></audio>
    </div>
</body>
</html>
